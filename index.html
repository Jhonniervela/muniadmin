<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Control de Entregas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --alert: #ef4444; --warning: #f59e0b; }
        body { background: var(--bg); font-family: sans-serif; padding-bottom: 40px; }
        .header-admin { background: #1e293b; color: white; padding: 1.5rem; text-align: center; border-radius: 0 0 30px 30px; margin-bottom: 25px; }
        .card-doc { border: none; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 12px; border-left: 6px solid var(--primary); transition: 0.3s; }
        .card-doc.RECIBIDO { border-left-color: #10b981; opacity: 0.8; }
        /* Estilos de Alerta de Plazos */
        .alerta-media { border-right: 8px solid var(--warning) !important; background: #fffbeb; }
        .alerta-critica { border-right: 8px solid var(--alert) !important; background: #fef2f2; }
        .modal-content { border-radius: 25px; border: none; }
        .badge-area { font-size: 0.7rem; background: #e2e8f0; color: #475569; padding: 4px 8px; border-radius: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

<header class="header-admin shadow">
    <h3 class="fw-bold mb-0">Gestión Administrativa</h3>
    <p class="small opacity-75 mb-0">Control de Folios y Expedientes - San Roque de Cumbaza</p>
</header>

<div class="container">
    <!-- REGISTRO CON DERIVACIÓN -->
    <div class="card p-4 mb-4 shadow-sm border-0" style="border-radius: 20px;">
        <h6 class="fw-bold text-muted mb-3">REGISTRAR NUEVO EXPEDIENTE</h6>
        <div class="row g-2">
            <div class="col-md-5 col-8"><input type="text" id="nExp" class="form-control p-2" placeholder="Número de Exp."></div>
            <div class="col-md-2 col-4"><input type="number" id="nFol" class="form-control p-2" placeholder="Folios"></div>
            <div class="col-md-5 col-12">
                <select id="areaDestino" class="form-select p-2">
                    <option value="SECRETARÍA GENERAL">SECRETARÍA GENERAL</option>
                    <option value="ALCALDÍA">ALCALDÍA</option>
                    <option value="INFRAESTRUCTURA">INFRAESTRUCTURA</option>
                    <option value="RENTAS">RENTAS / TRIBUTACIÓN</option>
                    <option value="DESARROLLO SOCIAL">DESARROLLO SOCIAL</option>
                </select>
            </div>
            <div class="col-12 mt-2">
                <button class="btn btn-primary w-100 fw-bold p-2" onclick="crear()">REGISTRAR Y DERIVAR</button>
            </div>
        </div>
    </div>

    <input type="text" id="buscador" class="form-control mb-4 rounded-pill" placeholder="🔍 Buscar expediente, área o estado..." onkeyup="filtrar()">
    
    <div class="d-flex gap-2 mb-3 small fw-bold text-muted">
        <span><i class="fas fa-square text-warning"></i> +5 días</span>
        <span><i class="fas fa-square text-danger"></i> +15 días (Crítico)</span>
    </div>

    <div id="lista-admin"></div>
</div>

<!-- MODAL DE FIRMA -->
<div class="modal fade" id="modalFirma" data-bs-backdrop="static" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow-lg p-3">
            <div class="modal-body text-center">
                <i class="fas fa-user-check fa-3x text-primary mb-3"></i>
                <h4 class="fw-bold">Validación de Firma</h4>
                <p class="text-muted" id="info-modal"></p>
                
                <div class="mb-3">
                    <label class="small fw-bold text-muted">CAMBIAR ESTADO A:</label>
                    <select id="nuevoEstado" class="form-select text-center fw-bold">
                        <option value="RECIBIDO">✔ RECIBIDO / FINALIZADO</option>
                        <option value="EN REVISIÓN">⏳ EN REVISIÓN</option>
                        <option value="OBSERVADO">❌ OBSERVADO</option>
                    </select>
                </div>

                <input type="password" id="claveValidar" class="form-control form-control-lg text-center mb-4" placeholder="Ingresa tu clave">
                <div class="d-grid gap-2">
                    <button class="btn btn-success btn-lg fw-bold" onclick="validarFirma()">CONFIRMAR TRÁMITE</button>
                    <button class="btn btn-light" data-bs-dismiss="modal">CANCELAR</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const firebaseConfig = { databaseURL: "https://secretaria-13b78-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let tempId = "";
    let modalBS;

    document.addEventListener("DOMContentLoaded", () => {
        modalBS = new bootstrap.Modal(document.getElementById('modalFirma'));
    });

    function crear() {
        const e = document.getElementById('nExp').value, 
              f = document.getElementById('nFol').value,
              a = document.getElementById('areaDestino').value;
              
        if(!e || !f) return Swal.fire('Aviso', 'Faltan datos', 'warning');
        
        db.ref('entregas').push({ 
            expediente: e, 
            folios: f, 
            area: a,
            estado: 'PENDIENTE',
            fecha_registro: new Date().toISOString() // Guardamos fecha ISO para cálculos
        });
        
        document.getElementById('nExp').value = ""; 
        document.getElementById('nFol').value = "";
    }

    db.ref('entregas').on('value', snap => {
        const div = document.getElementById('lista-admin'); div.innerHTML = "";
        
        snap.forEach(child => {
            const val = child.val();
            const fechaReg = new Date(val.fecha_registro);
            const hoy = new Date();
            
            // Cálculo de días transcurridos (Plazos Legales)
            const diffTiempo = Math.abs(hoy - fechaReg);
            const diasTranscurridos = Math.floor(diffTiempo / (1000 * 60 * 60 * 24));
            
            // Clases de alerta según el tiempo
            let claseAlerta = "";
            if (val.estado !== 'RECIBIDO') {
                if (diasTranscurridos >= 15) claseAlerta = "alerta-critica";
                else if (diasTranscurridos >= 5) claseAlerta = "alerta-media";
            }

            // Badge de color según estado
            let colorEstado = "bg-primary";
            if(val.estado === 'EN REVISIÓN') colorEstado = "bg-warning text-dark";
            if(val.estado === 'OBSERVADO') colorEstado = "bg-danger";
            if(val.estado === 'RECIBIDO') colorEstado = "bg-success";

            div.innerHTML += `
                <div class="card card-doc p-3 ${val.estado} ${claseAlerta}">
                    <div class="d-flex justify-content-between align-items-center">
                        <div style="flex: 1;">
                            <div class="d-flex align-items-center gap-2 mb-1">
                                <h6 class="fw-bold mb-0">${val.expediente}</h6>
                                <span class="badge ${colorEstado}" style="font-size:0.6rem">${val.estado}</span>
                            </div>
                            <div class="d-flex gap-2 align-items-center">
                                <span class="badge-area"><i class="fas fa-map-marker-alt me-1"></i>${val.area || 'GENERAL'}</span>
                                <small class="text-muted">${val.folios} folios</small>
                            </div>
                            <div class="mt-1">
                                <small class="text-muted" style="font-size:0.7rem">
                                    <i class="far fa-clock me-1"></i>Hace ${diasTranscurridos} días (Reg: ${fechaReg.toLocaleDateString()})
                                </small>
                            </div>
                        </div>
                        <div class="text-end">
                            ${val.estado !== 'RECIBIDO' 
                                ? `<button class="btn btn-outline-primary btn-sm px-3 fw-bold rounded-pill" onclick="abrirModal('${child.key}','${val.expediente}')">GESTIONAR</button>` 
                                : `<div class="text-success small fw-bold"><i class="fas fa-check-double"></i> ATENDIDO</div>`}
                        </div>
                    </div>
                </div>`;
        });
    });

    function abrirModal(id, exp) { 
        tempId = id; 
        document.getElementById('info-modal').innerText = "Expediente: " + exp;
        document.getElementById('claveValidar').value = "";
        modalBS.show(); 
    }

    function validarFirma() {
        const pass = document.getElementById('claveValidar').value;
        const nuevoE = document.getElementById('nuevoEstado').value;

        db.ref('configuracion/perfil_secretaria').once('value', snap => {
            const perfil = snap.val();
            if(pass === perfil.clave) {
                db.ref('entregas/' + tempId).update({ 
                    estado: nuevoE, 
                    fecha_firma: new Date().toLocaleDateString(), 
                    hora_firma: new Date().toLocaleTimeString(),
                    nombre_secre: perfil.nombre
                });
                modalBS.hide();
                Swal.fire('Actualizado', 'Estado del expediente actualizado correctamente', 'success');
            } else { 
                Swal.fire('Error', 'Clave de firma incorrecta', 'error');
            }
        });
    }

    // --- NOTIFICACIONES ---
    let inicial = true;
    db.ref('entregas').on('child_changed', snap => {
        if (inicial) return;
        const mod = snap.val();
        Swal.fire({ 
            title: 'MOVIMIENTO', 
            text: `Exp: ${mod.expediente} ahora está en ${mod.estado}`, 
            icon: 'info', toast: true, position: 'bottom-start', showConfirmButton: false, timer: 3000 
        });
    });
    setTimeout(() => { inicial = false; }, 2000);

    function filtrar() {
        const q = document.getElementById('buscador').value.toLowerCase();
        const cards = document.getElementsByClassName('card-doc');
        Array.from(cards).forEach(c => c.style.display = c.textContent.toLowerCase().includes(q) ? "block" : "none");
    }
</script>
</body>
</html>
